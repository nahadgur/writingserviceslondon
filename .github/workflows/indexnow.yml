name: IndexNow ping

# Pings api.indexnow.org with every sitemap URL after each push to main.
# Sleeps 90s to give Vercel time to deploy before we re-fetch the
# sitemap; that way IndexNow sees the freshly-deployed lastmod dates.

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'app/**/page.tsx'
      - 'app/**/ClientPage.tsx'
      - 'app/**Client.tsx'
      - 'app/sitemap.ts'
      - 'middleware.ts'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wait for Vercel deploy
        run: sleep 90
      - name: Submit URLs to IndexNow
        run: node scripts/indexnow-ping.mjs
